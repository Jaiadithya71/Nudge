prime_directive:
  id: "PRIME-001"
  name: "MAANG AI/ML Engineer"
  description: "Secure a high-paying AI/ML Engineer position at a MAANG or Tier-1 tech company"
  target_compensation: "₹25+ LPA"
  timeline: "Late 2028 - Early 2029"
  duration_years: 2-3

  motivation:
    - id: "M1"
      name: "Financial Freedom"
      description: "Afford lifestyle, gadgets, and experiences without constraint"
      quote: "Money is the tool for freedom"

    - id: "M2"
      name: "Competitive Drive"
      description: "Keep pace with and surpass peers (specifically Nesan)"
      quote: "Lead the pack, not just follow"

    - id: "M3"
      name: "Professional Mastery"
      description: "Validate skills at the highest level of industry standards"

