  - id: "OBJ-001"
    name: "Algorithmic Mastery"
    description: "Solve Hard problems on LeetCode/CodeChef consistently and efficiently"
    status: "in_progress"
    priority: "P0"
    timeframe: "Ongoing"

    key_results:
      - id: "KR-001a"
        metric: "LeetCode Knight rank achieved"
        target: true
        current: false
        unit: "boolean"

      - id: "KR-001b"
        metric: "Hard problems solved"
        target: 100
        current: 0
        unit: "problems"

      - id: "KR-001c"
        metric: "Daily streak maintained"
        target: 30
        current: 0
        unit: "days"

    weekly_time_allocation: 10
    daily_minimum: "1 Medium/Hard problem"
    protected_blocks:
      - "Daily 07:00-08:00"

  - id: "OBJ-002"
    name: "Data Science Dominance"
    description: "Achieve Kaggle Master rank across multiple streams"
