      - id: "KR-002b"
        metric: "Kaggle medals earned"
        target: 3
        current: 0
        unit: "medals"

      - id: "KR-002c"
        metric: "Kaggle Master rank achieved"
        target: true
        current: false
        unit: "boolean"

