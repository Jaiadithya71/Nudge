    metrics: ["streak", "contest_rating", "problems_solved"]

  - name: "Projects"
    frequency: "weekly"
    metrics: ["github_commits", "green_squares"]

  - name: "Reading"
    frequency: "biweekly"
    metrics: ["research_papers_read"]

review_schedule:
  weekly: "Sunday 10:00"
  monthly: "Last Sunday of month"
  quarterly: "End of Q1, Q2, Q3, Q4"

goal_protection_rules:
  - "If calendar conflicts with OBJ protected_blocks, decline or propose alternative"
  - "Weekly review: compare time_spent vs time_allocated for each objective"
  - "Alert if any P0 objective shows no progress for 7 days"
  - "Mission-aligned activities get calendar priority"
