# ══════════════════════════════════════════════════════════════════════════
# DECISION-MAKING HEURISTICS
# ══════════════════════════════════════════════════════════════════════════

decision_heuristics:
  time_vs_money:
    preference: "time"
    threshold: "If it saves > 2 hours and costs < ₹500, spend the money"
    note: "Time is more valuable for skill building"

  perfect_vs_done:
    preference: "done"
    rule: "80% quality shipped beats 100% quality stuck"
    exception: "Unless it's interview prep or portfolio piece"

  yes_vs_no:
    default: "no"
    rule: "Default to no for new commitments. Only yes if clearly aligned with MAANG goal."
    exception: "tier_1 contacts or clear career opportunities"

  urgent_vs_important:
    preference: "important"
    rule: "Important (mission-aligned) > Urgent (someone else's priority)"
    exception: "Work deadlines at Acies"

# ══════════════════════════════════════════════════════════════════════════
# COGNITIVE BIAS COUNTERS
# ══════════════════════════════════════════════════════════════════════════

cognitive_biases_to_counter:
  - name: "Recency bias"
    trigger: "Making decisions based on latest event"
    counter: "When making decisions, explicitly review relevant history"

  - name: "Planning fallacy"
    trigger: "Estimating task duration"
    counter: "Add 50% buffer to all time estimates"

  - name: "Sunk cost fallacy"
    trigger: "Continuing because of past investment"
    counter: "Evaluate decisions based on future value, not past investment"

  - name: "Social pressure"
    trigger: "Agreeing to things to please others"
    counter: "Check against MAANG goal before committing"

  - name: "Shiny object syndrome"
    trigger: "Getting distracted by new technologies/opportunities"
    counter: "Does this help Phase 1 skills? If not, defer."

# ══════════════════════════════════════════════════════════════════════════
# QUIRKS AND PREFERENCES
# ══════════════════════════════════════════════════════════════════════════

quirks_and_preferences:
  email_checking: "Batch only (09:30, 13:00, 17:00), never continuous"
  meeting_buffer: "Always 5 min between meetings"
  meeting_duration: "25 or 50 minutes preferred (not 30 or 60)"
  response_time_expectation: "Don't expect same-day replies from others"
  notification_policy: "Minimal during focus blocks"

  work_environment:
    preferred: "Quiet, distraction-free"
    tools: ["VS Code", "LeetCode", "Notion", "Terminal"]

  learning_style:
    preferred: "Hands-on practice over passive reading"
    ratio: "30% theory, 70% implementation"

